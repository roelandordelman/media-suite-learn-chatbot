        - "https://vocabs.dariah.eu/tadirah/segmenting"
        - "https://vocabs.dariah.eu/tadirah/visualAnnotation"
        - "https://vocabs.dariah.eu/tadirah/audioAnnotation"
    "Annotation Tool":
